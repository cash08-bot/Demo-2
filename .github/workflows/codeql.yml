name: CDK Deploy Pipeline

on:
  push:
    branches: [prod, dev, stg]
  pull_request:
    branches: [prod, dev, stg]

permissions:
  id-token: write
  contents: read
  actions: write
  pull-requests: write

jobs:
  synth-and-upload:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - branch: dev
            env_name: dev
          - branch: stg
            env_name: stg
          - branch: prod
            env_name: prod

    environment: ${{ matrix.env_name }}

    env:
      ENV_ID: ${{ matrix.env_name }}
      AWS_REGION: us-east-1
      BUCKET_NAME: test-1-git

    steps:
      - name: Exit if branch does not match matrix branch
        if: ${{ github.ref != format('refs/heads/{0}', matrix.branch) }}
        run: echo "Skipping job as this branch doesn't match matrix.branch" && exit 0

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::381492133980:role/GitHubAction-AssumeRoleWithAction.
          role-session-name: Github-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Set up Java and Maven
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Java CDK project
        run: mvn clean install

      - name: Run CDK synth with NIST80053 and log output
        run: |
          set -o pipefail
          (cdk synth --context env=${{ env.ENV_ID }} --output cdk.out || true) 2>&1 | tee synth.log

      - name: Upload CDK Nag synth log to S3 (if exists)
        if: always()
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ -f synth.log ]; then
            aws s3 cp synth.log s3://${{ env.BUCKET_NAME }}/nag-log-${{ env.ENV_ID }}-${SHORT_SHA}.log --region ${{ env.AWS_REGION }}
          else
            echo "synth.log not found. Skipping upload."
          fi

      - name: Fail the workflow if CDK synth failed
        run: |
          echo "Re-running synth to check for hard failure..."
          cdk synth --context env=${{ env.ENV_ID }} --output cdk.out

      - name: Zip the CDK project
        run: |
          zip -r cdk-project.zip . -x ".git/*" ".github/*"
          ls -lh cdk-project.zip

      - name: Upload CDK project zip to S3
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          aws s3 cp cdk-project.zip s3://${{ env.BUCKET_NAME }}/cdk-project-${{ env.ENV_ID }}-${SHORT_SHA}.zip --region ${{ env.AWS_REGION }}
